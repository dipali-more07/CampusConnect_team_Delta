version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: campusconnect_db
    environment:
      POSTGRES_USER: campusconnect_user
      POSTGRES_PASSWORD: campusconnect_password
      POSTGRES_DB: campusconnect_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - campusconnect_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusconnect_user -d campusconnect_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusconnect_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://campusconnect_user:campusconnect_password@db:5432/campusconnect_db
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campusconnect_network
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campusconnect_migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://campusconnect_user:campusconnect_password@db:5432/campusconnect_db
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campusconnect_network
    profiles:
      - migrate

volumes:
  postgres_data:

networks:
  campusconnect_network:
    driver: bridge
